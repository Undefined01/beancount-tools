rules:
- match:
    alipay_account: /工商银行储蓄卡\(1234\)/
  apply:
    transactionAccount: Assets:Bank:CN:ICBC-1234
- match:
    alipay_account: /工商银行储蓄卡\(5678\)/
  apply:
    transactionAccount: Assets:Bank:CN:ICBC-5678
- match:
    alipay_account: /招商银行储蓄卡\(5678\)/
  apply:
    transactionAccount: Assets:Bank:CN:CMB-5678
- match:
    alipay_account: 余额宝
  apply:
    transactionAccount: Assets:Digital:Alipay:YuEBao
- match:
    alipay_account: 账户余额
  apply:
    transactionAccount: Assets:Digital:Alipay:Balance
- match:
    alipay_account: 哈啰骑行卡
  apply:
    transactionAccount: Assets:Digital:Alipay:Balance
- match:
    wechat_account: 余额
  apply:
    transactionAccount: Assets:Digital:WeChat:Balance
