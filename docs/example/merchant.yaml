# Example Rules for Beancount Post-Processing
# Based on Tree Rules v1 Specification
rules:
- description: 充值缴费分类
  match:
    category: /充值缴费/
  children:
  - description: 中国电信话费
    match:
      payee: /中国电信/
    apply:
      counterpartyAccount: Expenses:Subscription:Mobile
  - description: 其他充值缴费
    apply:
      counterpartyAccount: Expenses:Subscription:Other
      $add:
        tags: need_review
- description: 交通出行分类
  match:
    category: /交通出行/
  children:
  - description: 公共交通
    match:
      narration: /地铁|公交/
    apply:
      counterpartyAccount: Expenses:Transport:Public
  - description: 哈啰单车
    match:
      payee: /哈啰出行/
      narration: /哈啰单车卡抵扣骑行费用/
    apply:
      counterpartyAccount: Expenses:Transport:Bike
  - description: 其他交通
    apply:
      counterpartyAccount: Expenses:Transport:Other
      $add:
        tags: need_review
- description: 投资理财分类
  match:
    category: /投资理财/
  children:
  - description: 蚂蚁财富
    match:
      payee: /蚂蚁财富/
    apply:
      counterpartyAccount: Assets:Trade:AntFortune
  - description: 其他投资理财
    apply:
      counterpartyAccount: Assets:Trade:Other
      $add:
        tags: need_review
- description: 餐饮美食分类
  match:
    category: /餐饮美食/
  children:
  - description: 外卖和快餐
    match:
      narration: /美团App|麦当劳/
    apply:
      counterpartyAccount: Expenses:Food:Dining:Takeout
  - description: 外卖和快餐
    match:
      narration: /美团收银/
    apply:
      counterpartyAccount: Expenses:Food:Dining:Restaurant
  - description: 其他餐饮
    apply:
      counterpartyAccount: Expenses:Food:Groceries
      $add:
        tags: need_review
- description: 公共洗衣机
  match:
    payee: /杭州企鹅科技有限公司/
    narration: /企鹅共享/
  apply:
    counterpartyAccount: Expenses:Housing:Maintenance
- description: 未识别
  apply:
    $add:
      tags: need_review
